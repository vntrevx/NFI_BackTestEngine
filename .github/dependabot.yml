version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      workflow-maintenance:
        patterns:
          - "*"
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      rust-maintenance:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      python-maintenance:
        patterns:
          - "*"
