# yamllint disable rule:line-length
name: Promote stable release

on:
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: Published release candidate tag, for example v1.0.0-rc.1
        required: true
        type: string
      stable_tag:
        description: Stable tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    name: Promote byte-identical assets
    runs-on: ubuntu-latest
    steps:
      - name: Validate release identities
        id: identity
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          STABLE_TAG: ${{ inputs.stable_tag }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]] \
            || { echo "candidate_tag must be a vX.Y.Z-rc.N tag" >&2; exit 1; }
          [[ "$STABLE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "stable_tag must be a vX.Y.Z tag" >&2; exit 1; }
          [[ "${CANDIDATE_TAG%%-rc.*}" == "$STABLE_TAG" ]] \
            || { echo "candidate and stable versions differ" >&2; exit 1; }

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${CANDIDATE_TAG}")"
          [[ "$(jq -r .prerelease <<<"$release_json")" == "true" ]]
          candidate_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${CANDIDATE_TAG}" --jq .object.sha
          )"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${STABLE_TAG}" >/dev/null 2>&1; then
            echo "stable tag already exists: $STABLE_TAG" >&2
            exit 1
          fi
          echo "sha=$candidate_sha" >> "$GITHUB_OUTPUT"
      - name: Download candidate assets
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir candidate
          gh release download "$CANDIDATE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir candidate
          (cd candidate && sha256sum --check SHA256SUMS.txt)
      - name: Create stable release from candidate files
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ inputs.stable_tag }}
          CANDIDATE_SHA: ${{ steps.identity.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$STABLE_TAG" candidate/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$CANDIDATE_SHA" \
            --title "$STABLE_TAG" \
            --generate-notes
      - name: Prove byte-identical promotion
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ inputs.stable_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir stable
          gh release download "$STABLE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir stable
          diff -qr candidate stable
          (cd stable && sha256sum --check SHA256SUMS.txt)
