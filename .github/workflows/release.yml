# yamllint disable rule:line-length
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: Publish the selected tag to PyPI after trusted publishing is configured
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  wheels:
    name: Wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_17"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_17"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          maturin-version: v1.11.5
          rust-toolchain: "1.83"
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --compatibility pypi --out dist
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          maturin-version: v1.11.5
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*
          if-no-files-found: error

  verify:
    name: Verify Linux release wheel
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Install built x86_64 wheel
        run: |
          uv venv --python 3.12 .release-venv
          uv pip install --python .release-venv/bin/python dist/*manylinux*x86_64.whl
      - name: Verify installed CLI and exact fixture
        run: |
          .release-venv/bin/nfi-bte --version
          .release-venv/bin/nfi-bte engine fixture \
            benchmarks/fixtures/captured/normal-routing-spot-2025-01-01_04/manifest.json \
            --output-dir .release-check \
            --level full

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: "*"
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    name: Publish PyPI
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_pypi
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nfi-backtest-engine
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: "*"
          path: dist
          merge-multiple: true
      - name: Publish with PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
