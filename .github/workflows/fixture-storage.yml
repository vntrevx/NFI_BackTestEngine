name: Fixture storage

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Upload a verified HTTPS bundle or download a verified S3 object
        required: true
        type: choice
        options:
          - upload
          - download
      object_key:
        description: Object key inside the configured evidence bucket
        required: true
        type: string
      sha256:
        description: Expected lowercase SHA-256 of the bundle
        required: true
        type: string
      source_url:
        description: HTTPS source URL for upload operations
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: fixture-storage-${{ inputs.object_key }}
  cancel-in-progress: false

jobs:
  transfer:
    runs-on: ubuntu-latest
    environment: evidence-storage
    env:
      AWS_REGION: ${{ vars.NFI_EVIDENCE_AWS_REGION }}
      BUCKET: ${{ vars.NFI_EVIDENCE_BUCKET }}
      OBJECT_KEY: ${{ inputs.object_key }}
      EXPECTED_SHA256: ${{ inputs.sha256 }}
      SOURCE_URL: ${{ inputs.source_url }}
    steps:
      - name: Validate transfer request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test -n "$BUCKET"
          test -n "$OBJECT_KEY"
          test -n "$AWS_REGION"
          if [[ "${{ inputs.operation }}" == "upload" ]]; then
            [[ "$SOURCE_URL" == https://* ]]
          fi

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ vars.NFI_EVIDENCE_AWS_ROLE }}
          aws-region: ${{ vars.NFI_EVIDENCE_AWS_REGION }}
          role-session-name: nfi-evidence-${{ github.run_id }}

      - name: Fetch upload source
        if: inputs.operation == 'upload'
        shell: bash
        run: |
          set -euo pipefail
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --show-error \
            --silent \
            --tlsv1.2 \
            --output certification-bundle.zip \
            "$SOURCE_URL"
          echo "$EXPECTED_SHA256  certification-bundle.zip" | sha256sum --check --strict

      - name: Upload immutable bundle
        if: inputs.operation == 'upload'
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp \
            certification-bundle.zip \
            "s3://$BUCKET/$OBJECT_KEY" \
            --metadata "sha256=$EXPECTED_SHA256" \
            --no-progress \
            --only-show-errors \
            --sse AES256

      - name: Download immutable bundle
        if: inputs.operation == 'download'
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_SHA256="$(
            aws s3api head-object \
              --bucket "$BUCKET" \
              --key "$OBJECT_KEY" \
              --query 'Metadata.sha256' \
              --output text
          )"
          test "$REMOTE_SHA256" = "$EXPECTED_SHA256"
          aws s3 cp \
            "s3://$BUCKET/$OBJECT_KEY" \
            certification-bundle.zip \
            --no-progress \
            --only-show-errors
          echo "$EXPECTED_SHA256  certification-bundle.zip" | sha256sum --check --strict

      - name: Verify stored metadata
        if: inputs.operation == 'upload'
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_SHA256="$(
            aws s3api head-object \
              --bucket "$BUCKET" \
              --key "$OBJECT_KEY" \
              --query 'Metadata.sha256' \
              --output text
          )"
          test "$REMOTE_SHA256" = "$EXPECTED_SHA256"

      - name: Expose verified download
        if: inputs.operation == 'download'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: certification-bundle
          path: certification-bundle.zip
          if-no-files-found: error
          retention-days: 7
